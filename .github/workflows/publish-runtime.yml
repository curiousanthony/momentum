name: Publish Runtime

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish-runtime:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"

      - name: Install Python test dependencies
        run: python -m pip install -e "./aggregator[dev]"

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: bun install --frozen-lockfile

      - name: Run backend tests
        run: pytest aggregator/tests/test_runtime.py aggregator/tests/test_updater.py -v

      - name: Run dashboard tests
        working-directory: dashboard
        run: bun test

      - name: Build dashboard
        working-directory: dashboard
        run: bun run build

      - name: Compute version metadata
        id: meta
        run: |
          echo "version=0.1.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "tag=v0.1.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Package runtime release
        run: |
          python scripts/package_runtime_release.py \
            --dashboard-dist dashboard/dist \
            --output-dir release \
            --version "${{ steps.meta.outputs.version }}" \
            --commit-sha "${{ github.sha }}" \
            --channel stable \
            --archive-base-url "https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}" \
            --manifest-url "https://github.com/${{ github.repository }}/releases/latest/download/stable.json"

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Momentum Runtime ${{ steps.meta.outputs.version }}
          files: |
            release/stable.json
            release/momentum-*.tar.gz
